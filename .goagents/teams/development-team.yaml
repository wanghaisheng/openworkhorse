# Development Team配置文件
# 开发团队的完整配置

team:
  id: "development-team"
  name: "开发团队"
  description: "负责系统开发和实现的团队"
  version: "1.0.0"
  category: "implementation"
  
  # 团队元数据
  metadata:
    author: "system"
    created: "2026-03-12"
    tags: ["development", "implementation", "coding", "testing"]
    team_size: "5-8"
    complexity: "high"
    
    # 适用项目类型
    applicable_projects:
      - "new_system_development"
      - "feature_development"
      - "system_enhancement"
      - "bug_fixing"
      - "performance_optimization"
  
  # 团队目标
  objectives:
    primary:
      - "高质量实现系统功能"
      - "确保代码质量和可维护性"
      - "按时完成开发任务"
      - "通过所有测试"
      - "准备部署包"
    
    secondary:
      - "优化系统性能"
      - "确保系统安全性"
      - "完善技术文档"
      - "分享开发经验"
      - "持续改进开发流程"
  
  # 团队成员
  members:
    - member_id: "tech_lead_01"
      agent: "agent_developer_01"
      role: "tech_lead"
      responsibilities: ["技术领导", "代码审查", "架构协调", "质量保证", "团队管理"]
      availability: "full_time"
      
      # Task执行配置
      task_execution:
        max_concurrent_tasks: 2
        preferred_task_types: ["backend-development", "api-implementation", "code-review", "technical-mentoring"]
        quality_focus: ["code_quality", "performance", "security", "scalability"]
      
      # 协作配置
      collaboration:
        collaboration_style: "lead"
        communication_preference: "technical"
        conflict_resolution: "technical_expertise"
        mentoring: true
    
    - member_id: "senior_developer_01"
      agent: "agent_developer_02"
      role: "senior_developer"
      responsibilities: ["后端开发", "API实现", "数据库开发", "技术指导"]
      availability: "full_time"
      
      task_execution:
        max_concurrent_tasks: 2
        preferred_task_types: ["backend-development", "database-development", "api-implementation"]
        quality_focus: ["code_quality", "performance", "security", "maintainability"]
      
      collaboration:
        collaboration_style: "collaborative"
        communication_preference: "technical"
        conflict_resolution: "technical_discussion"
        mentoring: true
    
    - member_id: "senior_developer_02"
      agent: "agent_developer_03"
      role: "senior_developer"
      responsibilities: ["全栈开发", "性能优化", "安全加固", "技术验证"]
      availability: "full_time"
      
      task_execution:
        max_concurrent_tasks: 2
        preferred_task_types: ["full-stack-development", "performance-optimization", "security-hardening"]
        quality_focus: ["performance", "security", "scalability", "reliability"]
      
      collaboration:
        collaboration_style: "specialist"
        communication_preference: "performance_focused"
        conflict_resolution: "benchmarking"
        mentoring: false
    
    - member_id: "frontend_developer_01"
      agent: "agent_developer_04"
      role: "frontend_developer"
      responsibilities: ["前端开发", "UI实现", "用户体验", "响应式设计"]
      availability: "full_time"
      
      task_execution:
        max_concurrent_tasks: 2
        preferred_task_types: ["frontend-development", "ui-implementation", "responsive-design"]
        quality_focus: ["user_experience", "code_quality", "performance", "accessibility"]
      
      collaboration:
        collaboration_style: "support"
        communication_preference: "user_focused"
        conflict_resolution: "user_testing"
        mentoring: false
    
    - member_id: "qa_engineer_01"
      agent: "agent_qa_01"
      role: "qa_engineer"
      responsibilities: ["测试设计", "质量保证", "自动化测试", "持续集成"]
      availability: "full_time"
      
      task_execution:
        max_concurrent_tasks: 2
        preferred_task_types: ["unit-testing", "integration-testing", "automation-testing", "performance-testing"]
        quality_focus: ["test_coverage", "defect_prevention", "quality_metrics", "automation"]
      
      collaboration:
        collaboration_style: "reviewer"
        communication_preference: "quality_focused"
        conflict_resolution: "quality_standards"
        mentoring: false
    
    - member_id: "qa_engineer_02"
      agent: "agent_qa_02"
      role: "automation_engineer"
      responsibilities: ["自动化测试", "持续集成", "性能测试", "CI/CD管道"]
      availability: "full_time"
      
      task_execution:
        max_concurrent_tasks: 2
        preferred_task_types: ["automation-testing", "ci_cd", "performance-testing", "monitoring"]
        quality_focus: ["automation", "reliability", "performance", "scalability"]
      
      collaboration:
        collaboration_style: "automation_specialist"
        communication_preference: "automation_focused"
        conflict_resolution: "automation_standards"
        mentoring: false
    
    - member_id: "devops_engineer_01"
      agent: "agent_developer_05"
      role: "devops_engineer"
      responsibilities: ["部署管理", "基础设施", "监控", "运维支持"]
      availability: "full_time"
      
      task_execution:
        max_concurrent_tasks: 2
        preferred_task_types: ["deployment", "infrastructure_setup", "monitoring", "troubleshooting"]
        quality_focus: ["reliability", "scalability", "security", "performance"]
      
      collaboration:
        collaboration_style: "support"
        communication_preference: "operations_focused"
        conflict_resolution: "operational_standards"
        mentoring: false
  
  # 团队角色定义
  roles:
    - role_id: "tech_lead"
      name: "技术负责人"
      description: "负责团队技术领导和技术决策"
      responsibilities:
        - "技术架构协调"
        - "代码质量把控"
        - "技术决策制定"
        - "团队技术指导"
        - "技术风险评估"
        - "开发流程优化"
      required_skills:
        - "系统架构"
        - "技术领导力"
        - "代码审查"
        - "性能优化"
        - "安全知识"
      quality_standards:
        - "技术决策质量"
        - "代码质量把控"
        - "团队技术能力"
        - "项目技术风险"
        - "开发流程效率"
    
    - role_id: "senior_developer"
      name: "高级开发工程师"
      description: "负责核心功能开发和技术实现"
      responsibilities:
        - "核心功能开发"
        - "技术方案实现"
        - "代码质量保证"
        - "技术指导"
        - "性能优化"
      required_skills:
        - "高级编程技能"
        - "系统设计"
        - "数据库开发"
        - "API开发"
        - "性能优化"
      quality_standards:
        - "代码质量"
        - "功能完整性"
        - "性能指标"
        - "安全性"
        - "可维护性"
    
    - role_id: "frontend_developer"
      name: "前端开发工程师"
      description: "负责用户界面开发和用户体验"
      responsibilities:
        - "前端功能开发"
        - "UI/UX实现"
        - "响应式设计"
        - "用户体验优化"
        - "前端性能优化"
      required_skills:
        - "前端框架"
        - "UI/UX设计"
        - "JavaScript/TypeScript"
        - "CSS/HTML"
        - "响应式设计"
      quality_standards:
        - "用户体验"
        - "界面美观性"
        - "响应式兼容"
        - "性能指标"
        - "可访问性"
        - "浏览器兼容性"
    
    - role_id: "qa_engineer"
      name: "质量保证工程师"
      description: "负责测试和质量保证"
      responsibilities:
        - "测试策略制定"
        - "自动化测试开发"
        - "质量检查执行"
        - "缺陷跟踪管理"
        - "质量报告生成"
      required_skills:
        - "测试方法论"
        - "自动化测试"
        - "性能测试"
        - "安全测试"
        - "缺陷管理"
      quality_standards:
        - "测试覆盖率"
        - "缺陷密度"
        - "测试质量"
        - "自动化程度"
        - "质量报告"
        - "缺陷修复率"
    
    - role_id: "automation_engineer"
      name: "自动化工程师"
      description: "负责自动化测试和持续集成"
      responsibilities:
        - "CI/CD管道维护"
        - "自动化测试开发"
        - "持续集成实施"
        - "性能监控配置"
        - "部署自动化"
      required_skills:
        - "CI/CD工具"
        - "自动化测试框架"
        - "容器化技术"
        - "云平台"
        - "监控工具"
      quality_standards:
        - "自动化覆盖率"
        - "构建成功率"
        - "部署成功率"
        - "监控覆盖率"
        - "故障恢复时间"
        - "自动化效率"
    
    - role_id: "devops_engineer"
      name: "运维工程师"
      description: "负责部署、运维和基础设施管理"
      responsibilities:
        - "部署管理"
        - "基础设施维护"
        - "系统监控"
        - "故障处理"
        - "性能优化"
        - "安全管理"
      required_skills:
        - "云平台"
        - "容器化技术"
        - "监控工具"
        - "脚本编程"
        - "网络安全"
        - "数据库管理"
      quality_standards:
        - "系统可用性"
        - "部署成功率"
        - "故障恢复时间"
        - "性能指标"
        - "安全合规"
        - "监控覆盖率"
  
  # 团队协作配置
  collaboration:
    # 协作模式
    collaboration_model: "agile_with_cross_functional_teams"
    decision_making: "consensus_based_with_lead_approval"
    communication_style: "technical_and_user_focused"
    
    # 协作工具
    tools:
      - tool: "development_environment"
        purpose: "开发环境"
        usage: "coding_testing_deployment"
      
      - tool: "version_control"
        purpose: "版本控制"
        usage: "code_management"
      
      - tool: "project_management"
        purpose: "项目管理"
        usage: "task_tracking_progress"
      
      - tool: "communication"
        purpose: "团队沟通"
        usage: "daily_coordination"
      
      - tool: "code_review"
        purpose: "代码审查"
        usage: "quality_assurance"
    
    # 协作流程
    workflows:
      - workflow: "daily_standup"
        participants: ["all_members"]
        frequency: "daily"
        duration: "15min"
        purpose: "progress_sync"
      
      - workflow: "sprint_planning"
        participants: ["all_members", "product_owner"]
        frequency: "bi_weekly"
        duration: "2h"
        purpose: "sprint_planning"
      
      - workflow: "code_review"
        participants: ["tech_lead", "developer", "qa_engineer"]
        frequency: "per_pull_request"
        purpose: "code_quality_assurance"
      
      - workflow: "testing_coordination"
        participants: ["developer", "qa_engineer", "automation_engineer"]
        frequency: "daily"
        purpose: "testing_coordination"
      
      - workflow: "deployment_coordination"
        participants: ["devops_engineer", "tech_lead", "qa_engineer"]
        frequency: "per_release"
        purpose: "deployment_coordination"
  
  # 团队质量保证
  quality_assurance:
    # 质量标准
    quality_standards:
      code_quality:
        maintainability_index: 0.8
        cyclomatic_complexity: 10
        code_coverage: 0.8
        duplicate_code: 0.05
        measurement: "static_analysis"
      
      performance_quality:
        response_time: "< 200ms"
        throughput: "> 1000 req/s"
        memory_usage: "< 512MB"
        cpu_usage: "< 70%"
        measurement: "performance_monitoring"
      
      security_quality:
        vulnerability_score: 0
        security_coverage: 0.95
        compliance_level: "high"
        measurement: "security_testing"
      
      documentation_quality:
        completeness: 0.9
        accuracy: 0.95
        clarity: 0.9
        maintainability: 0.85
        measurement: "documentation_review"
    
    # 质量检查流程
    quality_checks:
      - check: "code_review"
        frequency: "per_commit"
        reviewers: ["tech_lead", "senior_developer"]
        checklist: ["code_quality", "best_practices", "security", "performance"]
      
      - check: "unit_testing"
        frequency: "per_feature"
        validators: ["developer", "qa_engineer"]
        checklist: ["functionality", "edge_cases", "error_handling", "coverage_threshold"]
      
      - check: "integration_testing"
        frequency: "per_build"
        validators: ["qa_team", "devops_team"]
        checklist: ["api_integration", "data_flow", "error_scenarios", "performance_scenarios"]
      
      - check: "security_testing"
        frequency: "per_release"
        validators: ["security_team", "external_auditor"]
        checklist: ["vulnerability_scan", "penetration_test", "compliance_check"]
      
      - check: "performance_testing"
        frequency: "per_release"
        validators: ["performance_team", "devops_team"]
        checklist: ["load_testing", "stress_testing", "scalability_testing", "benchmark_comparison"]
    
    # 质量门禁
    quality_gates:
      - gate: "code_quality_gate"
        threshold: 0.8
        weight: 0.25
        description: "代码质量门禁"
        criteria: ["maintainability_index", "cyclomatic_complexity", "code_coverage", "duplicate_code"]
      
      - gate: "unit_test_coverage"
        threshold: 0.8
        weight: 0.2
        description: "单元测试覆盖率门禁"
        criteria: ["statement_coverage", "branch_coverage", "function_coverage", "edge_case_coverage"]
      
      - gate: "integration_test_success"
        threshold: 0.95
        weight: 0.2
        description: "集成测试成功率门禁"
        criteria: ["test_pass_rate", "defect_density", "integration_scenarios", "error_handling"]
      
      - gate: "performance_benchmarks"
        threshold: 0.85
        weight: 0.15
        description: "性能基准门禁"
        criteria: ["response_time", "throughput", "resource_usage", "scalability_metrics"]
      
      - gate: "security_compliance"
        threshold: 0.9
        weight: 0.15
        description: "安全合规门禁"
        criteria: ["vulnerability_scan", "penetration_test", "compliance_check", "security_best_practices"]
      
      - gate: "documentation_quality"
        threshold: 0.85
        weight: 0.05
        description: "文档质量门禁"
        criteria: ["completeness", "accuracy", "clarity", "maintainability"]
  
  # 团队绩效管理
  performance_management:
    # 绩效指标
    performance_metrics:
      - metric: "velocity"
        target: ">= 40 points/sprint"
        measurement: "story_points_completed"
        description: "开发速度"
      
      - metric: "code_quality"
        target: ">= 80 points"
        measurement: "code_review_score"
        description: "代码质量评分"
      
      - metric: "defect_density"
        target: "< 2 defects/KLOC"
        measurement: "defect_tracking"
        description: "缺陷密度"
      
      - metric: "test_coverage"
        target: ">= 80%"
        measurement: "coverage_analysis"
        description: "测试覆盖率"
      
      - metric: "deployment_success"
        target: ">= 95%"
        measurement: "deployment_tracking"
        description: "部署成功率"
    
    # 绩效评估
    performance_review:
      frequency: "sprint_retrospective"
      participants: ["all_members", "tech_lead", "product_owner"]
      review_criteria:
        - "velocity_achievement"
        - "code_quality_adherence"
        - "collaboration_effectiveness"
        - "knowledge_sharing"
        - "process_improvement"
    
    # 反馈机制
    feedback_mechanism:
      - type: "continuous_feedback"
        channels: ["code_review_comments", "daily_standup", "sprint_retrospective"]
        frequency: "continuous"
      
      - type: "360_degree_feedback"
        frequency: "quarterly"
        participants: ["peers", "tech_lead", "product_owner", "stakeholders"]
        purpose: "holistic_performance_assessment"
    
    # 激励机制
    incentive_mechanism:
      - type: "recognition_program"
        categories: ["technical_excellence", "innovation", "collaboration", "mentoring"]
        frequency: "monthly"
      
      - type: "skill_development"
        opportunities: ["training", "certifications", "conferences", "workshops"]
        budget: "annual_training_budget"
  
  # 团队学习和发展
  learning_development:
    # 技能发展
    skill_development:
      - skill: "technical_skills"
        current_level: "advanced"
        target_level: "expert"
        development_plan: ["advanced_training", "certification", "expert_mentoring"]
      
      - skill: "soft_skills"
        current_level: "intermediate"
        target_level: "advanced"
        development_plan: ["communication_training", "leadership_workshop", "project_management"]
      
      - skill: "domain_knowledge"
        current_level: "intermediate"
        target_level: "advanced"
        development_plan: ["domain_expert_consultation", "industry_conferences", "research_projects"]
    
    # 知识分享
    knowledge_sharing:
      - type: "tech_talks"
        frequency: "bi_weekly"
        presenters: ["team_members", "external_experts"]
        topics: ["new_technologies", "best_practices", "lessons_learned"]
      
      - type: "code_reviews"
        frequency: "continuous"
        focus: ["learning", "knowledge_sharing", "improvement_suggestions"]
      
      - type: "documentation"
        frequency: "per_project"
        content: ["technical_blogs", "best_practices", "architecture_decisions", "lessons_learned"]
    
    # 导师制度
    mentorship:
      - type: "peer_mentoring"
        mentors: ["senior_developers", "tech_lead"]
        mentees: ["junior_developers", "new_members"]
        focus: ["technical_skills", "career_growth", "team_integration"]
      
      - type: "expert_mentoring"
        mentors: ["external_experts", "industry_veterans"]
        mentees: ["senior_developers", "tech_lead"]
        focus: ["advanced_technologies", "industry_trends", "leadership_skills"]

---
# 配置验证规则
validation_rules:
  - rule: "required_fields"
    fields: ["team.id", "team.name", "team.objectives"]
    error_message: "缺少必需的配置字段"
  
  - rule: "members_completeness"
    check: "members.*role"
    error_message: "团队成员必须定义角色"
  
  - rule: "roles_defined"
    check: "roles.*responsibilities"
    error_message: "团队角色必须定义职责"
  
  - rule: "quality_assurance_defined"
    check: "quality_assurance.*quality_standards"
    error_message: "质量保证必须定义质量标准"

---
# 配置元数据
metadata:
  name: "Development Team配置"
  description: "开发团队的完整配置"
  version: "1.0.0"
  author: "system"
  created: "2026-03-12"
  updated: "2026-03-12"
  
  # 配置类别
  categories:
    - "team"
    - "collaboration"
    - "quality_assurance"
    - "performance_management"
    - "learning_development"
  
  # 依赖关系
  dependencies:
    - "development-phase.yaml"
    - "frontend-development-task.yaml"
    - "backend-development-task.yaml"
    - "database-development-task.yaml"
    - "api-implementation-task.yaml"
    - "unit-testing-task.yaml"
    - "integration-testing-task.yaml"
    - "performance-optimization-task.yaml"
    - "security-hardening-task.yaml"
    - "automation-testing-task.yaml"
  
  # 兼容性
  compatibility:
    min_version: "1.0.0"
    max_version: "2.0.0"
