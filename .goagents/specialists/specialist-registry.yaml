# 专家兼容性矩阵
compatibility_matrix:
  high_compatibility:
    - ["ecommerce-specialist", "frontend-specialist"]
    - ["fintech-specialist", "security-specialist"]
    - ["backend-specialist", "database-specialist"]
    - ["devops-specialist", "cloud-specialist"]
    - ["ai-specialist", "data-scientist"]
    - ["agile-coach", "scrum-master"]
    - ["product-owner", "ux-designer"]
    
  medium_compatibility:
    - ["ecommerce-specialist", "backend-specialist"]
    - ["fintech-specialist", "backend-specialist"]
    - ["frontend-specialist", "ux-designer"]
    - ["security-specialist", "compliance-officer"]
    - ["ai-specialist", "backend-specialist"]
    - ["quality-assurance", "devops-specialist"]
    
  low_compatibility:
    - ["fintech-specialist", "ecommerce-specialist"]
    - ["healthcare-specialist", "retail-specialist"]
    - ["government-specialist", "startup_expert"]
    - ["agile-coach", "waterfall_manager"]

# 专家性能指标
performance_metrics:
  decision_accuracy:
    senior: ">= 95%"
    mid: ">= 90%"
    junior: ">= 85%"
    
  response_time:
    senior: "< 2min"
    mid: "< 5min"
    junior: "< 10min"
    
  quality_score:
    senior: ">= 95"
    mid: ">= 90"
    junior: ">= 85"
    
  user_satisfaction:
    senior: ">= 95%"
    mid: ">= 90%"
    junior: ">= 85%"

# 专家发展路径
development_paths:
  junior_to_mid:
    requirements:
      - "完成10个项目"
      - "用户满意度 >= 85%"
      - "质量分数 >= 85"
      - "通过技能认证"
    training:
      - "高级技能培训"
      - "项目实战经验"
      - "导师指导"
    timeline: "6-12个月"
    
  mid_to_senior:
    requirements:
      - "完成25个项目"
      - "用户满意度 >= 90%"
      - "质量分数 >= 90"
      - "指导初级专家"
    training:
      - "专家级培训"
      - "复杂项目经验"
      - "知识分享"
    timeline: "12-24个月"
    
  senior_to_expert:
    requirements:
      - "完成50个项目"
      - "用户满意度 >= 95%"
      - "质量分数 >= 95"
      - "行业影响力"
    training:
      - "行业认证"
      - "创新项目"
      - "知识贡献"
    timeline: "24-36个月"

# 专家认证体系
certification_system:
  levels:
    - "初级认证"
    - "中级认证"
    - "高级认证"
    - "专家认证"
    
  requirements:
    初级认证:
      - "基础技能测试"
      - "项目实战考核"
      - "代码审查能力"
      
    中级认证:
      - "高级技能测试"
      - "复杂项目经验"
      - "团队协作能力"
      
    高级认证:
      - "专家技能测试"
      - "架构设计能力"
      - "指导能力"
      
    专家认证:
      - "行业影响力"
      - "创新能力"
      - "知识贡献"
      
  validity:
    初级认证: "1年"
    中级认证: "2年"
    高级认证: "3年"
    专家认证: "5年"
    
  renewal:
    requirements: "持续学习和项目经验"
    process: "重新认证"
    grace_period: "3个月"
