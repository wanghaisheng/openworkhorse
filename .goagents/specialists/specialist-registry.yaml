categories:
  domain_experts:
    description: "领域专家，具备特定行业深度知识"
    specialists:
      - "ecommerce-specialist"
      - "fintech-specialist"
      - "healthcare-specialist"
      - "education-specialist"
      - "logistics-specialist"
      - "retail-specialist"
      - "manufacturing-specialist"
      - "government-specialist"
      
  technical_experts:
    description: "技术专家，具备特定技术栈深度知识"
    specialists:
      - "frontend-specialist"
      - "backend-specialist"
      - "devops-specialist"
      - "mobile-specialist"
      - "ai-specialist"
      - "security-specialist"
      - "database-specialist"
      - "network-specialist"
      - "cloud-specialist"
      - "blockchain-specialist"
      
  role_experts:
    description: "角色专家，具备特定角色专业能力"
    specialists:
