# Requirements Analysis Milestone配置文件
# 需求分析里程碑的完整配置

milestone:
  id: "requirements-analysis"
  name: "需求分析"
  description: "完成项目需求分析和业务理解"
  version: "1.0.0"
  category: "analysis"
  phase: "discovery"
  
  # 里程碑元数据
  metadata:
    author: "system"
    created: "2026-03-12"
    tags: ["requirements", "analysis", "business", "stakeholders"]
    estimated_duration: "1-2 weeks"
    complexity: "medium"
    
    # 适用场景
    applicable_scenarios:
      - "new_project_kickoff"
      - "requirements_gathering"
      - "business_analysis"
      - "stakeholder_alignment"
    
    # 前置条件
    prerequisites:
      required:
        - "project_charter_approved"
        - "stakeholder_list_confirmed"
        - "business_context_understood"
      optional:
        - "existing_requirements_documentation"
        - "market_research_available"
        - "previous_project_analysis"
  
  # 里程碑目标
  objectives:
    primary:
      - "收集和分析所有业务需求"
      - "识别和确认关键利益相关者"
      - "定义项目成功标准"
      - "建立需求基线"
    
    secondary:
      - "分析业务流程和改进机会"
      - "识别潜在风险和缓解策略"
      - "建立沟通和反馈机制"
      - "准备下一阶段输入"
  
  # 验收标准
  acceptance_criteria:
    - "所有关键利益相关者已被识别和访谈"
    - "业务需求文档完整且经过验证"
    - "项目成功标准明确定义且可测量"
    - "需求基线建立并获得批准"
    - "风险识别和缓解计划制定"
    - "利益相关者对需求达成共识"
  
  # 里程碑输入
  inputs:
    required:
      - name: "project_charter"
        type: "markdown"
        description: "项目章程"
        validation: "completeness_check"
      
      - name: "stakeholder_list"
        type: "json"
        description: "利益相关者列表"
        validation: "completeness_check"
      
      - name: "business_context"
        type: "markdown"
        description: "业务背景信息"
        validation: "clarity_check"
    
    optional:
      - name: "existing_requirements"
        type: "markdown"
        description: "现有需求文档"
        validation: "relevance_check"
      
      - name: "market_research"
        type: "pdf"
        description: "市场研究报告"
        validation: "currency_check"
      
      - name: "previous_analysis"
        type: "markdown"
        description: "前期分析报告"
        validation: "completeness_check"
  
  # 里程碑输出
  outputs:
    required:
      - name: "requirements_document"
        type: "markdown"
        description: "需求规格文档"
        template: "requirements_template.md"
      
      - name: "stakeholder_analysis"
        type: "markdown"
        description: "利益相关者分析报告"
        template: "stakeholder_template.md"
      
      - name: "success_criteria"
        type: "json"
        description: "成功标准定义"
        template: "success_criteria_template.json"
      
      - name: "requirements_baseline"
        type: "markdown"
        description: "需求基线文档"
        template: "baseline_template.md"
    
    optional:
      - name: "process_analysis"
        type: "markdown"
        description: "业务流程分析"
        template: "process_analysis_template.md"
      
      - name: "risk_assessment"
        type: "markdown"
        description: "风险评估报告"
        template: "risk_assessment_template.md"
      
      - name: "communication_plan"
        type: "markdown"
        description: "沟通计划"
        template: "communication_template.md"
  
  # 质量标准
  quality_standards:
    completeness:
      threshold: 0.9
      description: "所有相关需求都被识别和记录"
      measurement: "coverage_analysis"
    
    accuracy:
      threshold: 0.85
      description: "需求描述准确无误"
      measurement: "accuracy_validation"
    
    clarity:
      threshold: 0.85
      description: "需求表达清晰易懂"
      measurement: "clarity_assessment"
    
    consistency:
      threshold: 0.85
      description: "需求之间逻辑一致"
      measurement: "consistency_check"
    
    traceability:
      threshold: 0.8
      description: "需求可追溯到利益相关者"
      measurement: "traceability_analysis"
    
    testability:
      threshold: 0.8
      description: "需求可执行和可测试"
      measurement: "testability_assessment"
  
  # 质量检查流程
  quality_checks:
    - check: "requirements_review"
      frequency: "per_requirement"
      reviewers: ["business_analyst", "domain_expert"]
      checklist: ["completeness", "accuracy", "clarity", "consistency"]
    
    - check: "stakeholder_validation"
      frequency: "per_milestone"
      validators: ["stakeholder_representative", "project_sponsor"]
      checklist: ["stakeholder_agreement", "requirement_conflict", "expectation_alignment"]
    
    - check: "peer_review"
      frequency: "per_batch"
      reviewers: ["senior_analyst", "qa_specialist"]
      checklist: ["quality_standards", "best_practices", "documentation_standards"]
    
    - check: "formal_approval"
      frequency: "per_milestone"
      approvers: ["project_sponsor", "business_owner"]
      checklist: ["acceptance_criteria", "risk_mitigation", "resource_allocation"]
  
  # 质量门禁
  quality_gates:
    - gate: "requirements_completeness"
      threshold: 0.9
      weight: 0.25
      description: "需求完整性检查"
      criteria: ["stakeholder_coverage", "functional_coverage", "non_functional_coverage"]
    
    - gate: "requirements_accuracy"
      threshold: 0.85
      weight: 0.25
      description: "需求准确性检查"
      criteria: ["business_alignment", "technical_feasibility", "consistency_check"]
    
    - gate: "requirements_clarity"
      threshold: 0.85
      weight: 0.2
      description: "需求清晰度检查"
      criteria: ["unambiguous_language", "measurable_criteria", "testable_scenarios"]
    
    - gate: "stakeholder_agreement"
      threshold: 0.8
      weight: 0.15
      description: "利益相关者一致性检查"
      criteria: ["stakeholder_signoff", "conflict_resolution", "expectation_alignment"]
    
    - gate: "success_criteria_definition"
      threshold: 0.85
      weight: 0.15
      description: "成功标准定义检查"
      criteria: ["measurable_objectives", "achievable_targets", "relevant_criteria", "time_bound_goals"]
  
  # 风险管理
  risk_management:
    identified_risks:
      - risk: "stakeholder_misalignment"
        probability: "medium"
        impact: "high"
        mitigation: "early_stakeholder_engagement"
      
      - risk: "requirements_incompleteness"
        probability: "medium"
        impact: "high"
        mitigation: "structured_requirements_gathering"
      
      - risk: "scope_creep"
        probability: "high"
        impact: "medium"
        mitigation: "change_control_process"
      
      - risk: "requirements_volatility"
        probability: "medium"
        impact: "medium"
        mitigation: "requirements_baseline_management"
    
    risk_monitoring:
      frequency: "weekly"
      escalation_threshold: 0.7
      reporting_format: "risk_dashboard"
  
  # 时间管理
  time_management:
    estimated_duration: "1-2 weeks"
    buffer_time: "20%"
    milestone_checkpoints: ["requirements_gathering", "requirements_analysis", "requirements_validation", "requirements_approval"]
    
    key_dates:
      - date: "requirements_gathering_complete"
        relative: "+3 days"
        importance: "high"
      - date: "stakeholder_interviews_complete"
        relative: "+7 days"
        importance: "high"
      - date: "requirements_analysis_complete"
        relative: "+10 days"
        importance: "high"
      - date: "requirements_approval"
        relative: "+14 days"
        importance: "critical"
  
  # 资源管理
  resource_management:
    human_resources:
      - role: "business_analyst"
        min_count: 1
        max_count: 3
        required_skills: ["requirements_gathering", "business_analysis", "stakeholder_management"]
      
      - role: "domain_expert"
        min_count: 1
        max_count: 2
        required_skills: ["domain_knowledge", "technical_feasibility", "industry_best_practices"]
      
      - role: "qa_specialist"
        min_count: 1
        max_count: 1
        required_skills: ["requirements_validation", "quality_assurance", "documentation_standards"]
    
    tools_resources:
      - tool: "requirements_management"
        type: "software"
        required: true
        examples: ["JIRA", "Confluence", "Azure DevOps"]
      
      - tool: "stakeholder_management"
        type: "software"
        required: true
        examples: ["Stakeholder Register", "Communication Matrix", "RACI Chart"]
      
      - tool: "documentation"
        type: "software"
        required: true
        examples: ["Markdown", "Word", "Google Docs"]
  
  # 沟通管理
  communication:
    internal_communication:
      - channel: "daily_standup"
        frequency: "daily"
        participants: ["requirements_team"]
        purpose: "progress_sync"
      
      - channel: "weekly_review"
        frequency: "weekly"
        participants: ["requirements_team", "project_manager"]
        purpose: "progress_review"
      
      - channel: "milestone_review"
        frequency: "per_milestone"
        participants: ["requirements_team", "stakeholders", "project_sponsor"]
        purpose: "milestone_acceptance"
    
    external_communication:
      - channel: "stakeholder_interviews"
        frequency: "as_needed"
        participants: ["stakeholders", "requirements_team"]
        purpose: "requirements_gathering"
      
      - channel: "requirements_validation"
        frequency: "per_milestone"
        participants: ["stakeholders", "requirements_team", "project_sponsor"]
        purpose: "requirements_approval"
      
      - channel: "status_updates"
        frequency: "weekly"
        participants: ["stakeholders", "project_team"]
        purpose: "progress_communication"
  
  # 文档管理
  documentation:
    document_standards:
      - standard: "requirements_template"
        description: "需求文档模板标准"
        elements: ["introduction", "stakeholder_analysis", "functional_requirements", "non_functional_requirements", "constraints", "assumptions"]
      
      - standard: "traceability_matrix"
        description: "需求可追溯性矩阵"
        elements: ["requirement_id", "source", "stakeholder", "priority", "status"]
      
      - standard: "change_request_process"
        description: "需求变更管理流程"
        elements: ["request_form", "impact_analysis", "approval_workflow", "baseline_update"]
    
    version_control:
      system: "git"
      branching_strategy: "feature_branches"
      tag_convention: "milestone-v{version}"
      review_process: "pull_request_review"
    
    document_storage:
      location: "project_docs/requirements/"
      backup_frequency: "daily"
      access_control: "role_based"
  
  # 学习和改进
  learning_improvement:
    experience_collection:
      enabled: true
      collection_points:
        - "requirements_gathering_challenges"
        - "stakeholder_engagement_effectiveness"
        - "quality_assessment_findings"
        - "process_improvement_opportunities"
    
    knowledge_base_update:
      frequency: "per_project"
      categories: ["requirements_best_practices", "stakeholder_management", "quality_assessment_criteria", "template_improvements"]
    
    continuous_improvement:
      enabled: true
      improvement_cycle: "monthly"
      improvement_goals:
        - goal: "reduce_requirements_gathering_time"
          target: "10%"
          measurement: "time_tracking"
        - goal: "improve_requirements_quality"
          target: "15%"
          measurement: "quality_metrics"
        - goal: "enhance_stakeholder_satisfaction"
          target: "20%"
          measurement: "satisfaction_survey"

---
# 配置验证规则
validation_rules:
  - rule: "required_fields"
    fields: ["milestone.id", "milestone.name", "milestone.objectives"]
    error_message: "缺少必需的配置字段"
  
  - rule: "acceptance_criteria_completeness"
    check: "acceptance_criteria.*length"
    error_message: "验收标准必须完整定义"
  
  - rule: "quality_standards_defined"
    check: "quality_standards.*threshold"
    error_message: "质量标准必须定义阈值"
  
  - rule: "quality_gates_completeness"
    check: "quality_gates.*threshold"
    error_message: "质量门禁必须完整定义"

---
# 配置元数据
metadata:
  name: "Requirements Analysis Milestone配置"
  description: "需求分析里程碑的完整配置"
  version: "1.0.0"
  author: "system"
  created: "2026-03-12"
  updated: "2026-03-12"
  
  # 配置类别
  categories:
    - "milestone"
    - "quality"
    - "risk_management"
    - "communication"
    - "documentation"
    - "learning"
  
  # 依赖关系
  dependencies:
    - "discovery-phase.yaml"
    - "business-analysis-task.yaml"
    - "user-research-task.yaml"
    - "market-analysis-task.yaml"
  
  # 兼容性
  compatibility:
    min_version: "1.0.0"
    max_version: "2.0.0"
